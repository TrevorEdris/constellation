---
# Production-hardened Deployment template
# Replace <APP_NAME>, <NAMESPACE>, <IMAGE>, and resource values for your service.
# Reference: kubernetes skill manifest-security-checklist.md

apiVersion: apps/v1
kind: Deployment
metadata:
  name: <APP_NAME>
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/name: <APP_NAME>
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: kustomize   # or: helm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: <APP_NAME>
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # Never reduce capacity below desired
      maxSurge: 1         # One extra pod during rollout
  minReadySeconds: 10     # Wait 10s after pod ready before considering rollout successful
  template:
    metadata:
      labels:
        app.kubernetes.io/name: <APP_NAME>
        app.kubernetes.io/version: "1.0.0"   # Update on each deploy
      annotations:
        # Optionally force rollout on ConfigMap change by embedding a hash
        # checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: <APP_NAME>
      automountServiceAccountToken: false   # Set true only if calling K8s API

      # Pod-level security context (PSS Restricted)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534      # nobody; or your app's dedicated UID
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      # Graceful shutdown: allow in-flight requests to complete
      terminationGracePeriodSeconds: 30

      containers:
        - name: app
          image: <IMAGE>:<TAG>
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            # Only add capabilities if explicitly required:
            # add: ["NET_BIND_SERVICE"]  # Only if binding port < 1024

          # Resources — measure P99 and set accordingly
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # Writable scratch space (required when readOnlyRootFilesystem: true)
          volumeMounts:
            - name: tmp
              mountPath: /tmp

          # Environment from secrets/configmaps
          envFrom:
            - configMapRef:
                name: <APP_NAME>-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: <APP_NAME>-secrets
                  key: db-password

          # Startup probe — prevents liveness from firing during initialization
          startupProbe:
            httpGet:
              path: /livez
              port: http
            failureThreshold: 30    # 30 * 10s = 5 min max startup
            periodSeconds: 10

          # Liveness probe — restarts deadlocked containers
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe — gates traffic routing
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: tmp
          emptyDir: {}

      # Anti-affinity: spread pods across nodes for availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: <APP_NAME>
                topologyKey: kubernetes.io/hostname
