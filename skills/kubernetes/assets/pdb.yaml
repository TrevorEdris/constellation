---
# PodDisruptionBudget — ensures minimum availability during node drains and upgrades
# Replace <APP_NAME> and <NAMESPACE> with your values.
# Required for every Deployment with replicas > 1.

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: <APP_NAME>-pdb
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/name: <APP_NAME>
spec:
  # Choose ONE of the following:

  # minAvailable: minimum number of pods that must remain available
  # Use with smaller replica counts (2-4 replicas)
  minAvailable: 1

  # maxUnavailable: maximum number of pods that may be simultaneously unavailable
  # Use with larger replica counts (5+ replicas); allows proportional disruption
  # maxUnavailable: 1
  # maxUnavailable: "20%"    # Percentage form

  selector:
    matchLabels:
      app.kubernetes.io/name: <APP_NAME>

# Rule of thumb:
# - 2 replicas: minAvailable: 1
# - 3 replicas: minAvailable: 2  (or maxUnavailable: 1)
# - 5+ replicas: maxUnavailable: "20%"
