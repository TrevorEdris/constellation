# Default values for my-service.
# Override per environment with: helm install -f values-prod.yaml

# -- Number of replicas
replicaCount: 2

image:
  # -- Container image repository
  repository: my-org/my-service
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides Chart.AppVersion when set
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount for this chart
  create: true
  # -- Annotations to add (e.g. for IAM role binding)
  annotations: {}
  name: ""
  # -- Disable API credential auto-mount
  automountServiceAccountToken: false

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /livez
    port: http
  periodSeconds: 10
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  periodSeconds: 5
  failureThreshold: 3

# -- Startup probe (disable for fast-starting services)
startupProbe:
  enabled: true
  httpGet:
    path: /livez
    port: http
  failureThreshold: 30
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  allowSameNamespace: true

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - my-service
          topologyKey: kubernetes.io/hostname

# -- Extra environment variables
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

# -- Environment from ConfigMaps or Secrets
extraEnvFrom: []
# - secretRef:
#     name: my-service-secrets
