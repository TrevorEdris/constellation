# Python GitLab CI Pipeline
# --------------------------
# Stages: lint -> test -> build
# Uses pip with project-relative cache for GitLab Runner compatibility.
# Supports both requirements.txt and pyproject.toml (with pip install -e .[dev]).

variables:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.cache/pip"    # Project-relative pip cache

stages:
  - lint
  - test
  - build

# --------------------------------------------------------------------------
# Shared configuration
# --------------------------------------------------------------------------

.python-base:
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - python -m pip install --upgrade pip
  cache:
    key:
      files:
        - requirements*.txt
        - pyproject.toml
        - poetry.lock
    paths:
      - .cache/pip/
    policy: pull

# --------------------------------------------------------------------------
# Lint -- ruff (linter + formatter check) + mypy
# --------------------------------------------------------------------------

lint:
  extends: .python-base
  stage: lint
  timeout: 10 minutes
  cache:
    key:
      files:
        - requirements*.txt
        - pyproject.toml
    paths:
      - .cache/pip/
    policy: pull-push    # Lint job populates cache
  script:
    # Install dev dependencies
    - pip install -e ".[dev]"    # Or: pip install -r requirements-dev.txt
    # Lint with ruff
    - ruff check .
    - ruff format --check .
    # Type check (optional -- remove if not using type annotations)
    - mypy . --ignore-missing-imports
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure:
    exit_codes: 1    # Remove this once lint is clean

# --------------------------------------------------------------------------
# Test -- pytest with coverage
# --------------------------------------------------------------------------

test:
  extends: .python-base
  stage: test
  timeout: 15 minutes
  cache:
    key:
      files:
        - requirements*.txt
        - pyproject.toml
    paths:
      - .cache/pip/
    policy: pull-push
  script:
    - pip install -e ".[dev]"
    - |
      pytest \
        --cov=src \
        --cov-report=xml:coverage.xml \
        --cov-report=term-missing \
        --junitxml=test-results.xml \
        -v \
        tests/
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      junit: test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week
    when: always
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# --------------------------------------------------------------------------
# Build -- package distribution (for libraries)
# For services, replace with your container build or deployment artifact
# --------------------------------------------------------------------------

build:
  extends: .python-base
  stage: build
  needs: [lint, test]
  timeout: 10 minutes
  script:
    - pip install build
    - python -m build
    - ls -la dist/
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  interruptible: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'    # Only build dist on version tags
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'   # And on default branch
