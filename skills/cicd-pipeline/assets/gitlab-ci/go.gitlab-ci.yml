# Go GitLab CI Pipeline
# ----------------------
# Stages: lint -> test -> build
# Uses project-relative GOPATH for reliable GitLab Runner caching.
# Go version is set in the image tag -- align with your go.mod go directive.

variables:
  GO_VERSION: "1.23"
  # Project-relative paths so GitLab Runner can cache them
  GOPATH: "${CI_PROJECT_DIR}/.cache/go"
  GOMODCACHE: "${CI_PROJECT_DIR}/.cache/go/pkg/mod"
  GOCACHE: "${CI_PROJECT_DIR}/.cache/go/build"
  CGO_ENABLED: "0"

stages:
  - lint
  - test
  - build

# --------------------------------------------------------------------------
# Shared configuration
# --------------------------------------------------------------------------

.go-base:
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git make ca-certificates
  cache:
    key:
      files:
        - go.sum
    paths:
      - .cache/go/pkg/mod/   # Downloaded module cache
      - .cache/go/build/     # Build artifact cache
    policy: pull

# --------------------------------------------------------------------------
# Lint -- golangci-lint
# --------------------------------------------------------------------------

lint:
  extends: .go-base
  stage: lint
  timeout: 10 minutes
  cache:
    key:
      files:
        - go.sum
    paths:
      - .cache/go/pkg/mod/
      - .cache/go/build/
      - .cache/golangci-lint/
    policy: pull-push    # Lint job populates the cache
  variables:
    GOLANGCI_LINT_CACHE: "${CI_PROJECT_DIR}/.cache/golangci-lint"
  before_script:
    - apk add --no-cache git make ca-certificates
    - |
      # Install golangci-lint
      GOLANGCI_VERSION="v1.62.2"
      curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
        | sh -s -- -b /usr/local/bin ${GOLANGCI_VERSION}
  script:
    - go mod download
    - golangci-lint run --timeout=5m ./...
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# --------------------------------------------------------------------------
# Test -- race detector + coverage
# --------------------------------------------------------------------------

test:
  extends: .go-base
  stage: test
  timeout: 15 minutes
  cache:
    key:
      files:
        - go.sum
    paths:
      - .cache/go/pkg/mod/
      - .cache/go/build/
    policy: pull-push
  script:
    - go mod download
    - go test -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out | tail -1
    - go tool cover -html=coverage.out -o coverage.html
  coverage: '/total:\s+\(statements\)\s+(\d+\.?\d*)%/'
  artifacts:
    paths:
      - coverage.out
      - coverage.html
    expire_in: 1 week
    when: always
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# --------------------------------------------------------------------------
# Build -- static release binary
# --------------------------------------------------------------------------

build:
  extends: .go-base
  stage: build
  needs: [lint, test]
  timeout: 10 minutes
  script:
    - go mod download
    - |
      go build \
        -ldflags="-s -w -X main.version=${CI_COMMIT_TAG:-dev} -X main.commit=${CI_COMMIT_SHA}" \
        -o dist/app \
        ./cmd/app    # Replace with your main package path
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
