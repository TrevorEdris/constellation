# Docker Build and Push GitLab CI Pipeline
# ------------------------------------------
# Builds and pushes a Docker image to GitLab Container Registry.
# Uses Kaniko for rootless, daemon-free image building (no privileged runner required).
# Tags: commit SHA (always), branch name, and semver tag (on tag push).

variables:
  DOCKER_IMAGE: "${CI_REGISTRY_IMAGE}"
  # Kaniko cache registry -- uses the same registry to store layer cache
  KANIKO_CACHE_REGISTRY: "${CI_REGISTRY_IMAGE}/cache"

stages:
  - build
  - scan
  - push

# --------------------------------------------------------------------------
# Build image with Kaniko
# --------------------------------------------------------------------------

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  timeout: 30 minutes
  before_script:
    # Authenticate to GitLab Container Registry
    - mkdir -p /kaniko/.docker
    - |
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
        > /kaniko/.docker/config.json
  script:
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --destination "${DOCKER_IMAGE}:${CI_COMMIT_SHA}" \
        --cache=true \
        --cache-repo="${KANIKO_CACHE_REGISTRY}" \
        --cache-ttl=168h \
        --compressed-caching=false \
        --snapshot-mode=redo
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# --------------------------------------------------------------------------
# Vulnerability scan with Trivy
# --------------------------------------------------------------------------

scan-image:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: [build-image]
  timeout: 15 minutes
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".cache/trivy"
  cache:
    key: trivy-db
    paths:
      - .cache/trivy/
  before_script:
    - trivy image --download-db-only
  script:
    - |
      trivy image \
        --exit-code 1 \
        --severity CRITICAL,HIGH \
        --no-progress \
        --format template \
        --template "@/contrib/gitlab.tpl" \
        --output gl-container-scanning-report.json \
        "${DOCKER_IMAGE}:${CI_COMMIT_SHA}"
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
    when: always
  allow_failure: false    # Set to true if you want to continue despite vulnerabilities
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# --------------------------------------------------------------------------
# Tag and push additional tags (branch, latest, semver)
# --------------------------------------------------------------------------

.push-tag:
  stage: push
  image: gcr.io/go-containerregistry/crane:latest
  needs: [build-image, scan-image]
  timeout: 10 minutes
  before_script:
    - crane auth login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
  interruptible: false    # Don't cancel a tag push

push-branch-tag:
  extends: .push-tag
  script:
    - crane tag "${DOCKER_IMAGE}:${CI_COMMIT_SHA}" "${CI_COMMIT_REF_SLUG}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

push-latest-tag:
  extends: .push-tag
  script:
    - crane tag "${DOCKER_IMAGE}:${CI_COMMIT_SHA}" latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

push-version-tags:
  extends: .push-tag
  script:
    # Push full semver tag (e.g., 1.2.3)
    - crane tag "${DOCKER_IMAGE}:${CI_COMMIT_SHA}" "${CI_COMMIT_TAG}"
    # Push minor version tag (e.g., 1.2)
    - MINOR_TAG=$(echo "${CI_COMMIT_TAG}" | grep -oE 'v?[0-9]+\.[0-9]+' | head -1)
    - crane tag "${DOCKER_IMAGE}:${CI_COMMIT_SHA}" "${MINOR_TAG}"
    # Push major version tag (e.g., 1)
    - MAJOR_TAG=$(echo "${CI_COMMIT_TAG}" | grep -oE 'v?[0-9]+' | head -1)
    - crane tag "${DOCKER_IMAGE}:${CI_COMMIT_SHA}" "${MAJOR_TAG}"
    - crane tag "${DOCKER_IMAGE}:${CI_COMMIT_SHA}" latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
