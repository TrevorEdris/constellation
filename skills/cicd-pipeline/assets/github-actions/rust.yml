# Rust CI Pipeline
# -----------------
# Runs clippy (lint), fmt (format check), test, and release build.
# Rust toolchain version read from rust-toolchain.toml if present.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Lint -- clippy + fmt
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable   # Reads rust-toolchain.toml if present
        with:
          components: clippy, rustfmt

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@9d47c6ad4e1f16d5c2f2eed5a614a79f6ce80437  # v2.8.0

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  # --------------------------------------------------------------------------
  # Test
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@9d47c6ad4e1f16d5c2f2eed5a614a79f6ce80437  # v2.8.0

      - name: Run tests
        run: cargo test --all-features --verbose

      # Optionally run with nextest for faster parallel test execution:
      # - uses: taiki-e/install-action@nextest
      # - run: cargo nextest run --all-features

  # --------------------------------------------------------------------------
  # Build -- release binary
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@9d47c6ad4e1f16d5c2f2eed5a614a79f6ce80437  # v2.8.0

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: release-binary
          path: target/release/app  # Replace 'app' with your binary name
          retention-days: 1
          if-no-files-found: ignore
