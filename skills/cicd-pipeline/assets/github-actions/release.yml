# Production Release Pipeline
# ----------------------------
# Triggered by semver tag push (v*) or manual dispatch.
# Stages: build -> test -> security scan -> staging deploy -> smoke test -> production deploy
# Automatic rollback on failure. Creates a GitHub Release with changelog.
#
# Required: Configure "staging" and "production" environments in repository settings
# with appropriate protection rules (approvers for production, branch restrictions).

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.2.3)"
        required: true
        type: string
      skip-staging:
        description: "Skip staging deployment (emergency production fix)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write      # Required to create GitHub Release
  packages: write      # Required to push container image
  id-token: write      # Required for OIDC cloud auth
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RELEASE_VERSION: ${{ github.ref_name }}

jobs:
  # --------------------------------------------------------------------------
  # Build and test
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac5e64bb5d4ab5ce2256c5b23  # v3.10.0

      - name: Log in to Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a39b77f6f49b2173e2e7b8b  # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c2  # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Security scan (runs in parallel with or after build)
  # --------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@a20de5420d57c4102486cdd9349b532415f15e8b  # v0.29.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1    # Fail release on CRITICAL or HIGH vulnerabilities

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d9dfb97dce  # v3.28.15
        with:
          sarif_file: trivy-results.sarif

  # --------------------------------------------------------------------------
  # Deploy to staging
  # --------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, security-scan]
    if: ${{ !inputs.skip-staging }}
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Configure cloud credentials via OIDC (no long-lived secrets)
      # Uncomment and configure for your cloud provider:
      # - uses: aws-actions/configure-aws-credentials@...
      #   with:
      #     role-to-assume: arn:aws:iam::123456789:role/github-staging-deploy
      #     aws-region: us-east-1

      - name: Deploy to staging
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"
          echo "Deploying $IMAGE to staging"
          # kubectl set image deployment/app app=$IMAGE --namespace staging
          # helm upgrade app ./charts/app --namespace staging --set image.digest=${{ needs.build.outputs.image-digest }}

      - name: Wait for staging rollout
        run: |
          echo "Waiting for deployment to be ready..."
          # kubectl rollout status deployment/app --namespace staging --timeout=5m

      - name: Smoke test staging
        run: |
          echo "Running smoke tests against staging..."
          # curl --fail --retry 5 --retry-delay 3 https://staging.example.com/health
          # ./scripts/smoke-test.sh https://staging.example.com

  # --------------------------------------------------------------------------
  # Deploy to production (requires manual approval if environment protection is configured)
  # --------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, security-scan, deploy-staging]
    if: always() && (needs.deploy-staging.result == 'success' || inputs.skip-staging)
    environment:
      name: production
      url: https://example.com

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Deploy to production
        id: deploy
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"
          echo "Deploying $IMAGE to production"
          # kubectl set image deployment/app app=$IMAGE --namespace production
          # kubectl rollout status deployment/app --namespace production --timeout=5m

      - name: Verify production health
        run: |
          echo "Verifying production health..."
          # curl --fail --retry 10 --retry-delay 5 https://example.com/health

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "Deployment failed -- rolling back"
          # kubectl rollout undo deployment/app --namespace production

  # --------------------------------------------------------------------------
  # Create GitHub Release (runs after production deploy)
  # --------------------------------------------------------------------------
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy-production
    if: success()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0    # Full history for changelog generation

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog from commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [[ -n "$PREV_TAG" ]]; then
            CHANGES=$(git log --oneline "${PREV_TAG}..HEAD" --no-merges)
          else
            CHANGES=$(git log --oneline HEAD~20..HEAD --no-merges)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8e5b6851b50a3  # v2.3.0
        with:
          generate_release_notes: true
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changes }}

            ## Container Image

            ```
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}
            ```
