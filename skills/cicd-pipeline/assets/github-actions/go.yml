# Go CI Pipeline
# ---------------
# Runs lint (golangci-lint), test (with race detector + coverage), and build.
# Go version is read from go.mod automatically by actions/setup-go.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Lint -- golangci-lint with automatic caching
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@d60b41a563a35a8c32d69f5d4f82aab80ae4af30  # v5.5.0
        with:
          go-version-file: go.mod  # Reads Go version from go.mod
          cache: true              # Caches ~/go/pkg/mod and ~/.cache/go-build

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4c6b43  # v8.0.0
        with:
          version: latest
          args: --timeout=5m

  # --------------------------------------------------------------------------
  # Test -- race detector + coverage report
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@d60b41a563a35a8c32d69f5d4f82aab80ae4af30  # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: |
          go test \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # --------------------------------------------------------------------------
  # Build -- verifies the binary compiles; lint + test must pass first
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@d60b41a563a35a8c32d69f5d4f82aab80ae4af30  # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -v ./...  # Replace ./... with your target package, e.g. ./cmd/app

      - name: Build release binary
        # Remove or customize this step for your actual binary path
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o dist/app ./cmd/app
        continue-on-error: true  # Remove this after updating the path above

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: app-binary
          path: dist/
          retention-days: 1
          if-no-files-found: ignore
