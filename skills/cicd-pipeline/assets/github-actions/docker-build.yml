# Docker Build and Push Pipeline
# --------------------------------
# Multi-platform image build (linux/amd64, linux/arm64) with layer caching.
# Pushes to GitHub Container Registry (GHCR) with SHA, branch, and semver tags.
#
# Required secrets: None (uses GITHUB_TOKEN for GHCR authentication)
# Optional: Set REGISTRY to push to a different registry (e.g., Docker Hub)

name: Docker Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write    # Required to push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # e.g., org/repo -> ghcr.io/org/repo

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Set up QEMU for cross-platform builds (arm64 on amd64 runner)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff27c9a6fdc0ff3af5c  # v3.6.0

      # Enable BuildKit and multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac5e64bb5d4ab5ce2256c5b23  # v3.10.0

      # Authenticate to GHCR (skip on PRs from forks -- no write access)
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags based on git ref:
      # - PR: pr-123
      # - Branch push (main): main, sha-abc1234
      # - Tag push (v1.2.3): 1.2.3, 1.2, 1, latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a39b77f6f49b2173e2e7b8b  # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c2  # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}  # Only push on non-PR events
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching using GitHub Actions cache backend
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arguments (uncomment and customize as needed):
          # build-args: |
          #   APP_VERSION=${{ github.ref_name }}
          #   BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}

  # --------------------------------------------------------------------------
  # Vulnerability scan -- run after build, on non-PR events only
  # --------------------------------------------------------------------------
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write   # Required to upload SARIF results

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@a20de5420d57c4102486cdd9349b532415f15e8b  # v0.29.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0          # Don't fail the build on vulnerabilities; upload report instead

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d9dfb97dce  # v3.28.15
        with:
          sarif_file: trivy-results.sarif
