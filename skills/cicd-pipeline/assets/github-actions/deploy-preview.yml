# Preview Deployment Pipeline
# ----------------------------
# Deploys an ephemeral preview environment for each pull request.
# Comments the preview URL on the PR. Tears down on PR close.
#
# Customize: Replace the deploy/teardown steps with your actual deployment tool
# (Vercel, Fly.io, Railway, Kubernetes, etc.)

name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write    # Required to post PR comments

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Deploy preview environment on PR open/update
  # --------------------------------------------------------------------------
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.action != 'closed'
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ---- Example: Vercel deployment ----
      # - name: Deploy to Vercel
      #   id: deploy
      #   env:
      #     VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      #   run: |
      #     PREVIEW_URL=$(vercel --token $VERCEL_TOKEN --yes 2>&1 | tail -1)
      #     echo "preview-url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      # ---- Example: Fly.io deployment ----
      # - name: Deploy to Fly.io
      #   id: deploy
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      #   run: |
      #     APP_NAME="pr-${{ github.event.pull_request.number }}-myapp"
      #     fly apps create $APP_NAME --org my-org 2>/dev/null || true
      #     fly deploy --app $APP_NAME --remote-only
      #     echo "preview-url=https://$APP_NAME.fly.dev" >> $GITHUB_OUTPUT

      # ---- Example: Kubernetes namespace per PR ----
      - name: Deploy preview environment
        id: deploy
        run: |
          NAMESPACE="preview-pr-${{ github.event.pull_request.number }}"
          PREVIEW_URL="https://${NAMESPACE}.preview.example.com"
          # kubectl create namespace $NAMESPACE 2>/dev/null || true
          # helm upgrade --install preview ./charts/app \
          #   --namespace $NAMESPACE \
          #   --set image.tag=${{ github.sha }} \
          #   --set ingress.host=${NAMESPACE}.preview.example.com
          echo "Deploying to namespace: $NAMESPACE"
          echo "preview-url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Post preview URL comment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043  # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Preview Deployment

            | | |
            |--|--|
            | **Status** | Deployed |
            | **URL** | ${{ steps.deploy.outputs.preview-url }} |
            | **Commit** | `${{ github.sha }}` |

            Preview environments are automatically removed when this PR is closed.
          edit-mode: replace
          comment-author: github-actions[bot]
          body-includes: "## Preview Deployment"

  # --------------------------------------------------------------------------
  # Tear down preview environment on PR close
  # --------------------------------------------------------------------------
  cleanup-preview:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.action == 'closed'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Teardown preview environment
        run: |
          NAMESPACE="preview-pr-${{ github.event.pull_request.number }}"
          echo "Tearing down preview: $NAMESPACE"
          # kubectl delete namespace $NAMESPACE --ignore-not-found
          # fly apps destroy pr-${{ github.event.pull_request.number }}-myapp --yes || true

      - name: Update PR comment on cleanup
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043  # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Preview Deployment

            | | |
            |--|--|
            | **Status** | Removed (PR closed) |
          edit-mode: replace
          comment-author: github-actions[bot]
          body-includes: "## Preview Deployment"
