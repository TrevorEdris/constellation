AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lambda + HTTP API Gateway starter template

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

Globals:
  Function:
    Runtime: python3.12        # Change to: nodejs20.x, go1.x, java21, etc.
    MemorySize: 256
    Timeout: 30
    Tracing: Active            # X-Ray tracing
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment

Resources:
  Api:
    Type: AWS::Serverless::HttpApi   # HTTP API (v2) — prefer over RestApi for new projects
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - "*"                      # Replace with your domain in production
        AllowHeaders:
          - "Content-Type"
          - "Authorization"
        AllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler       # Change to match your runtime and file
      Description: Main API handler
      Events:
        AnyRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY
      Policies:
        # Add policies for resources this function accesses:
        # - S3ReadPolicy: { BucketName: !Ref MyBucket }
        # - DynamoDBReadPolicy: { TableName: !Ref MyTable }
        # - AWSSecretsManagerGetSecretValuePolicy: { SecretArn: !Ref MySecret }
        - CloudWatchPutMetricPolicy: {}

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ApiFunction.Arn
