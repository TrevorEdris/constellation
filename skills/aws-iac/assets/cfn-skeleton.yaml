AWSTemplateFormatVersion: "2010-09-09"
Description: "TODO: One-line description of this stack's purpose"

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  Env:
    Type: String
    AllowedValues: [dev, staging, prod]
    Description: "Deployment environment"

  # Example secret parameter — always use NoEcho for sensitive values
  # DatabasePassword:
  #   Type: String
  #   NoEcho: true
  #   Description: "RDS master password — consider using Secrets Manager instead"

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  IsProd: !Equals [!Ref Env, prod]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # Storage
  # ---------------------------------------------------------------------------
  AppBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain         # Prevent accidental data loss
    UpdateReplacePolicy: Retain    # Also required for replace operations
    Properties:
      BucketName: !Sub "${AWS::StackName}-${Env}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteNoncurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90

  AppBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AppBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt AppBucket.Arn
              - !Sub "${AppBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  # ---------------------------------------------------------------------------
  # IAM
  # ---------------------------------------------------------------------------
  AppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-${Env}-app-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com  # Change to appropriate service
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AppPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${AppBucket.Arn}/*"

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  BucketName:
    Description: "S3 bucket name"
    Value: !Ref AppBucket
    Export:
      Name: !Sub "${AWS::StackName}:BucketName"

  BucketArn:
    Description: "S3 bucket ARN"
    Value: !GetAtt AppBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}:BucketArn"

  AppRoleArn:
    Description: "Application IAM role ARN"
    Value: !GetAtt AppRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}:AppRoleArn"
